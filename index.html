<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano com seleção de teclado MIDI</title>
  <style>
    :root {
      --blue-900: #0c3b8e;
      --blue-700: #1f63d9;
      --blue-100: #ecf3ff;
      --text: #122b57;
      --card: #ffffff;
      --border: #d2e2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #f2f7ff, #ffffff);
      color: var(--text);
      padding: 24px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 10px 28px rgba(15, 55, 132, 0.13);
    }

    .header {
      padding: 24px;
      background: linear-gradient(120deg, var(--blue-900), var(--blue-700));
      color: #fff;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.6vw, 1.9rem);
    }

    .header p {
      margin: 0;
      opacity: 0.95;
    }

    .content {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
    }

    .log-box {
      display: grid;
      gap: 8px;
    }
  </style>
</head>
<body>
  <main>
    <header class="header">
      <h1>Piano com seleção de teclado MIDI</h1>
      <p>Interface ajustada com layout responsivo, melhor organização visual e estrutura HTML moderna.</p>
    </header>

    <section class="content" aria-label="Configurações de instrumentos">
      <div class="grid">
        <div class="field">
          <label for="midi-inputs-1">Teclado MIDI - Instrumento 1</label>
          <select id="midi-inputs-1">
            <option disabled selected>Selecione um teclado MIDI</option>
          </select>
        </div>

        <div class="field">
          <label for="tipoSom1">Tipo de som - Instrumento 1</label>
          <select id="tipoSom1">
            <option value="harmonica">Harmonica</option>
            <option value="accordion" selected>Accordion</option>
            <option value="violin">Violin</option>
            <option value="baritone_sax">Baritone Sax</option>
            <option value="cello">Cello</option>
            <option value="flute">Flute</option>
            <option value="clarinet">Clarinet</option>
            <option value="oboe">Oboe</option>
            <option value="soprano_sax">Soprano Sax</option>
            <option value="tenor_sax">Tenor Sax</option>
            <option value="bassoon">Bassoon</option>
          </select>
        </div>

        <div class="field">
          <label for="midi-inputs-2">Teclado MIDI - Instrumento 2</label>
          <select id="midi-inputs-2">
            <option disabled selected>Selecione um teclado MIDI</option>
          </select>
        </div>

        <div class="field">
          <label for="tipoSom2">Tipo de som - Instrumento 2</label>
          <select id="tipoSom2">
            <option value="corvinoAcordeon" selected>Corvino Acordeon</option>
            <option value="harmonica">Harmonica</option>
            <option value="accordion">Accordion</option>
            <option value="violin">Violin</option>
            <option value="baritone_sax">Baritone Sax</option>
            <option value="cello">Cello</option>
            <option value="clarinet">Clarinet</option>
            <option value="oboe">Oboe</option>
            <option value="soprano_sax">Soprano Sax</option>
            <option value="tenor_sax">Tenor Sax</option>
            <option value="bassoon">Bassoon</option>
          </select>
        </div>

        <div class="field">
          <label for="oitavaBaixo">Ajuste de oitava - Instrumento 2</label>
          <select id="oitavaBaixo">
            <option value="0">Zero</option>
            <option value="1">Um</option>
            <option value="2">Dois</option>
            <option value="3" selected>Três</option>
            <option value="4">Quatro</option>
            <option value="5">Cinco</option>
            <option value="6">Seis</option>
            <option value="7">Sete</option>
            <option value="8">Oito</option>
          </select>
        </div>
      </div>

      <div class="log-box">
        <label for="logtext">Log de execução</label>
        <textarea id="logtext" aria-label="Log de execução"></textarea>
      </div>
    </section>
  </main>

  <script type="text/javascript" src="infraestrutura/webmidi.min.js"></script>
  <script type="text/javascript" src="infraestrutura/sf2-parser-all.js"></script>

  <script type="text/javascript" src="audio/accordion-mp3.js"></script>
  <script type="text/javascript" src="audio/baritone_sax-mp3.js"></script>
  <script type="text/javascript" src="audio/bassoon-mp3.js"></script>
  <script type="text/javascript" src="audio/cello-mp3.js"></script>
  <script type="text/javascript" src="audio/clarinet-mp3.js"></script>
  <script type="text/javascript" src="audio/flute-mp3.js"></script>
  <script type="text/javascript" src="audio/harmonica-mp3.js"></script>
  <script type="text/javascript" src="audio/oboe-mp3.js"></script>
  <script type="text/javascript" src="audio/soprano_sax-mp3.js"></script>
  <script type="text/javascript" src="audio/tenor_sax-mp3.js"></script>
  <script type="text/javascript" src="audio/violin-mp3.js"></script>
  <script type="text/javascript" src="audio/corvinoAcordeon.js"></script>

  <script type="text/javascript" src="service/play.js"></script>
  <script type="text/javascript" src="service/midiService.js"></script>
</body>
</html>
